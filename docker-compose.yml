services:
  backend:
    build: ./backend
    # Seed the demo database (users, history, fixture claims, precedents) before
    # serving; the seeder is idempotent so restarts are safe.
    command: >
      sh -c "python -m scripts.seed
      && uvicorn app.main:get_application --factory --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////app/var/claimflow.sqlite
    volumes:
      - ./backend/var:/app/var
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      # Seeding runs before uvicorn; with live LLM keys the keyed stage calls
      # can take several minutes, so give startup a wide grace window.
      start_period: 600s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      # The middleware verifies the same HS256 session cookie the backend
      # signs; both services MUST share this value (interpolated from .env).
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-0123456789abcdef}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
